<html>
    <head>
        <title>Exercise 13.3</title>
        <style>
            p {
                margin: 0;
                font-family: Roboto, Arial;
                line-height: 20px;
            }
            .upper {
                display: flex;
                align-items: center;
                width: 450px;
            }
            .pfp {
                margin-right: 10px;
            }
            .pfp-image {
                width: 50px;
                height: 50px;
                display: block;
                object-fit: cover;
                border-radius: 50%;
            }
            .usersite {
                font-weight: bold;
            }
            .username {
                color: rgba(100, 100, 100);
            }
            .description {
                display: inline-block;
            }
            
            .lower {
                display: flex;
                align-items: center;
                justify-content: flex-end;
                width: 350px;
                margin-top: 20px;
                border: 1px solid rgba(100, 100, 100, 0.35);
                border-radius: 12px;
                margin-left: 70px;
                overflow: hidden;
            }
            .empty-box {
                width: 75px;
                height: 75px;;
                background-color: rgba(100, 100, 100, 0.35);
                flex-shrink: 0;
            }
            .preview {
                margin-left: 12px;
            }
        </style>
    </head>
    <body>
        <div class="upper">
            <div class="pfp">
                <img class="pfp-image" src="/exercise-images/cat.jpg" alt="cat image">
            </div>

            <div class="detail">
                <p><span class="usersite">supersimple.dev</span> <span class="username">@SuperSimpleDev</span></p>
                <p class="description">What is backend web development? A complete overview. New video is up!</p>
            </div>
        </div>
        
        <div class="lower">
            <div class="empty-box"></div>
            <div class="preview">
                <p class="username">youtube.com</p>
                <p>Backend web development - a complete overview (2021)</p>
            </div>
        </div>
    </body>
</html>
