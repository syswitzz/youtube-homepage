<html>
    <head>
        <title>Exercise 13.1</title>
        <style>
            p {
                margin: 0;
                line-height: 20px;
                font-family: Roboto, Arial;
            }
            .outer {
                width: 400px;
                box-shadow: 0 0 4px rgb(100,100,100);
                border-radius: 4px;
                padding: 12px 12px 24px;
            }
            .inner1 {
                margin-bottom: 20px;
            }
            .all-inboxes {
                font-size: 13px;
                color: rgb(100, 100, 100);
            }
            .inner2 {
                display: flex;
                flex-direction: row;
                align-items: center;
            }
            .pfp {
                margin: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .pfp-image {
                width: 45px;
                height: 45px;
                display: block;
                object-fit: cover;
                border-radius: 50%;
            }
            .details {
                flex: 1;
            }
            .title-time {
                display: flex;
                justify-content: space-between;
            }
            .title {
                font-weight: bold;
            }
            .time {
                font-size: 13px;
                color: rgb(100,100,100);
            }
            .description {
                font-weight: bold;
                font-size: 14px;
            }
            .detailed-description {
                font-size: 14px;
                color: rgb(100,100,100);
            }
        </style>
    </head>
    <body>
        <div class="outer">
            <div class="inner1">
                <p class="all-inboxes">ALL INBOXES</p>
            </div>
            <div class="inner2">
                <div class="pfp">
                    <img src="/exercise-images/cat.jpg" class="pfp-image">
                </div>

                <div class="details">
                    <div class="title-time">
                        <p class="title">Chewy Promotions</p>
                        <p class="time">4:58 PM</p>
                    </div>
                    <p class="description">Biggest sale of the year!</p>
                    <p class="detailed-description">Hey there! We're writing to tell you about our...</p>
                </div>
            </div>
        </div>
    </body>
</html>
